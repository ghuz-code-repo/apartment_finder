services:
  # Веб-приложение Flask
  web:
    build: .
    container_name: apartment-finder-app
    env_file:
      - .env
    volumes:
      # Монтируем директории для хранения данных
      - ./:/app/instance
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - default
      - service_network

volumes:
  mysql_data:

networks:
  service_network:
    external: true
